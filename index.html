<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-55-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Neue-Haas-Grotesk-Display-Pro/Neue-Haas-Grotesk-Display-Pro-75-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <title>Smart Campus – FOM Hochschule</title>
  <style>
    @font-face {
      font-family: 'Neue-Haas-Grotesk-Text-Pro';
      src: url('fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-55-Regular.woff2') format('woff2'),
           url('fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-55-Regular.woff') format('woff');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Neue-Haas-Grotesk-Text-Pro';
      src: url('fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-75-Bold.woff2') format('woff2'),
           url('fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-75-Bold.woff') format('woff');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Neue-Haas-Grotesk-Display-Pro';
      src: url('fonts/Neue-Haas-Grotesk-Display-Pro/Neue-Haas-Grotesk-Display-Pro-75-Bold.woff2') format('woff2'),
           url('fonts/Neue-Haas-Grotesk-Display-Pro/Neue-Haas-Grotesk-Display-Pro-75-Bold.woff') format('woff');
      font-weight: 700; font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Neue-Haas-Grotesk-Text-Pro', Helvetica, Arial, sans-serif;
      color: #1A1816;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animated gradient mesh background ── */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #FAF8F5;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0, 198, 178, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(240, 237, 232, 0.8) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 60% 20%, rgba(229, 224, 217, 0.5) 0%, transparent 60%);
      animation: meshDrift 25s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 75% 25%, rgba(0, 198, 178, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 50% 70% at 30% 80%, rgba(229, 224, 217, 0.6) 0%, transparent 50%);
      animation: meshDrift2 30s ease-in-out infinite alternate;
    }

    @keyframes meshDrift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-20px, 15px) scale(1.02); }
      100% { transform: translate(10px, -10px) scale(0.98); }
    }

    @keyframes meshDrift2 {
      0%   { transform: translate(0, 0) scale(1.01); }
      50%  { transform: translate(15px, -20px) scale(0.99); }
      100% { transform: translate(-10px, 10px) scale(1.02); }
    }

    /* SVG noise grain overlay */
    .grain-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ── Glassmorphic login card ── */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      padding: 52px 44px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(40px) saturate(1.2);
      -webkit-backdrop-filter: blur(40px) saturate(1.2);
      border: 1px solid rgba(229, 224, 217, 0.6);
      border-radius: 24px;
      box-shadow:
        0 4px 6px rgba(26, 24, 22, 0.02),
        0 12px 24px rgba(26, 24, 22, 0.04),
        0 32px 64px rgba(26, 24, 22, 0.06);
      animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-card .logo {
      display: block;
      height: 44px;
      margin: 0 auto 36px;
    }

    .login-card h1 {
      font-family: 'Neue-Haas-Grotesk-Display-Pro', Helvetica, Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #1A1816;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-card .subtitle {
      font-size: 15px;
      color: #8A837A;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* ── Module preview hint ── */
    .module-hint {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(250, 248, 245, 0.8);
      border: 1px solid #E5E0D9;
      border-radius: 12px;
      margin-bottom: 28px;
    }

    .module-hint-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00C6B2;
      flex-shrink: 0;
    }

    .module-hint-text {
      font-size: 13px;
      color: #4A4540;
      line-height: 1.4;
    }

    .module-hint-text strong {
      color: #1A1816;
    }

    /* ── Form elements ── */
    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #1A1816;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .field-input {
      width: 100%;
      padding: 15px 18px;
      background: #FAF8F5;
      border: 1.5px solid #E5E0D9;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      color: #1A1816;
      outline: none;
      transition: all 0.2s ease;
    }

    .field-input::placeholder {
      color: #B5AFA6;
    }

    .field-input:focus {
      border-color: #1A1816;
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(26, 24, 22, 0.06);
    }

    .field-input.has-error {
      border-color: #D4483B;
      box-shadow: 0 0 0 3px rgba(212, 72, 59, 0.08);
    }

    /* ── Dark ink button ── */
    .btn-login {
      width: 100%;
      padding: 16px 24px;
      margin-top: 8px;
      background: #1A1816;
      color: #FFFFFF;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.2px;
    }

    .btn-login:hover {
      background: #2D2A27;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(26, 24, 22, 0.15);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(26, 24, 22, 0.1);
    }

    .btn-login svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Error message ── */
    .error-msg {
      color: #D4483B;
      font-size: 14px;
      font-weight: 600;
      margin-top: 14px;
      text-align: center;
      display: none;
    }

    /* ── Footer text ── */
    .login-footer {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid #E5E0D9;
      font-size: 13px;
      color: #8A837A;
      text-align: center;
      line-height: 1.7;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card {
        margin: 16px;
        padding: 36px 28px;
        border-radius: 20px;
      }
      .login-card h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <!-- Animated gradient mesh -->
  <div class="mesh-bg"></div>
  <div class="grain-overlay"></div>

  <!-- Login card -->
  <div class="login-card">
    <img class="logo" src="assets/fom-logo.svg" alt="FOM Hochschule">

    <h1>Willkommen zur&uuml;ck</h1>
    <p class="subtitle">Melde dich an, um dein Modul fortzusetzen.</p>

    <div class="module-hint">
      <span class="module-hint-dot"></span>
      <span class="module-hint-text"><strong>Management Basics</strong> &mdash; 10 Lerneinheiten, KI-Assistent &amp; mehr</span>
    </div>

    <form id="loginForm" onsubmit="return checkPassword()">
      <div class="field-group">
        <label class="field-label" for="pwd">Passwort</label>
        <input class="field-input" type="password" id="pwd" placeholder="Passwort eingeben" autofocus>
      </div>
      <button type="submit" class="btn-login">
        Anmelden
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>
    <div class="error-msg" id="errMsg">Falsches Passwort. Bitte erneut versuchen.</div>

    <div class="login-footer">
      Teil des Studiengangs an der FOM Hochschule.<br>
      Bei Fragen wende dich an deine Studienberatung.
    </div>
  </div>

  <script>
    const H = 'de9980e86ba07bfff68dcf82032d565cb5cedce738e1f2aa47657b910844d3f4';
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    async function checkPassword() {
      const inp = document.getElementById('pwd');
      const hash = await sha256(inp.value);
      if (hash === H) {
        sessionStorage.setItem('dashboard_auth', H);
        window.location.href = 'modules/management-basics/special-01-modulinfo.html';
      } else {
        document.getElementById('errMsg').style.display = 'block';
        inp.classList.add('has-error');
        inp.addEventListener('focus', () => inp.classList.remove('has-error'), { once: true });
      }
      return false;
    }
    if (sessionStorage.getItem('dashboard_auth') === H) {
      window.location.href = 'modules/management-basics/special-01-modulinfo.html';
    }
  </script>
</body>
</html>
