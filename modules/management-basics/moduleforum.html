  <style>
    .forum-wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 24px 16px;
    }

    .forum-head {
      margin-bottom: 18px;
    }

    .forum-back {
      display: inline-block;
      margin-top: 8px;
    }

    .forum-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .forum-card {
      background: #f1faf7;
      border: 1px solid #d6e8e4;
      border-radius: 12px;
      padding: 14px;
    }

    .forum-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
    }

    .forum-field {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #c8d7d3;
      border-radius: 8px;
      font: inherit;
      box-sizing: border-box;
      background: #ffffff;
    }

    .forum-submit {
      background: #43ad9d;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .forum-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .forum-item {
      background: #ffffff;
      border: 1px solid #d6e8e4;
      border-radius: 10px;
      padding: 12px;
    }

    .forum-item-title {
      margin: 0 0 6px 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .forum-item-meta {
      margin: 0 0 8px 0;
      color: #4a5c69;
      font-size: 0.92rem;
    }

    .forum-empty {
      margin: 0;
      color: #4a5c69;
    }
  </style>
</head>

<main class='forum-wrap'>
    <section class='forum-head'>
      <h1>Modulforum - Management Basics</h1>
      <p>Stelle Fragen zu Inhalten und tausche dich mit anderen Studierenden aus.</p>
      <a class='forum-back' href='special-01-modulinfo.html'>&larr; Zurück zur Modulinformation</a>
    </section>

    <section class='forum-grid'>
      <article class='forum-card' aria-label='Neuen Beitrag erstellen'>
        <h2>Neuen Beitrag erstellen</h2>
        <form id='forumForm'>
          <input class='forum-field' id='author' type='text' placeholder='Dein Name' required />
          <input class='forum-field' id='title' type='text' placeholder='Titel deiner Frage' required />
          <textarea class='forum-field' id='message' rows='4' placeholder='Deine Frage oder dein Beitrag' required></textarea>
          <button class='forum-submit' type='submit'>Beitrag veröffentlichen</button>
        </form>
      </article>

      <article class='forum-card' aria-label='Beiträge'>
        <h2>Beiträge</h2>
        <p class='forum-empty' id='forumEmpty'>Noch keine Beiträge vorhanden.</p>
        <ul class='forum-list' id='forumList'></ul>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var storageKey = 'managementBasicsForumPosts';
      var listEl = document.getElementById('forumList');
      var emptyEl = document.getElementById('forumEmpty');
      var formEl = document.getElementById('forumForm');

      function getPosts() {
        try {
          var raw = localStorage.getItem(storageKey);
          return raw ? JSON.parse(raw) : [];
        } catch (err) {
          return [];
        }
      }

      function savePosts(posts) {
        localStorage.setItem(storageKey, JSON.stringify(posts));
      }

      function renderPosts() {
        var posts = getPosts();
        listEl.innerHTML = '';
        emptyEl.style.display = posts.length ? 'none' : 'block';

        posts.forEach(function (post) {
          var li = document.createElement('li');
          li.className = 'forum-item';
          li.innerHTML =
            '<p class="forum-item-title">' + post.title + '</p>' +
            '<p class="forum-item-meta">von ' + post.author + ' am ' + post.date + '</p>' +
            '<p>' + post.message + '</p>';
          listEl.appendChild(li);
        });
      }

      formEl.addEventListener('submit', function (event) {
        event.preventDefault();
        var author = document.getElementById('author').value.trim();
        var title = document.getElementById('title').value.trim();
        var message = document.getElementById('message').value.trim();
        if (!author || !title || !message) return;

        var posts = getPosts();
        posts.unshift({
          author: author,
          title: title,
          message: message,
          date: new Date().toLocaleString('de-DE')
        });
        savePosts(posts);
        formEl.reset();
        renderPosts();
      });

      renderPosts();
    })();
  </script>
